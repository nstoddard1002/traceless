version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://traceless:traceless@db:5432/traceless?sslmode=disable
      - PORT=8080
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=traceless
      - POSTGRES_PASSWORD=traceless
      - POSTGRES_DB=traceless
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/migrations:/docker-entrypoint-initdb.d
    restart: always

volumes:
  postgres_data:
